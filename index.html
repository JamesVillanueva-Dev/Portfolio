<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Portfolio for James Villanueva, a computer science student and aspiring full-stack developer."
    >
    <title>James Villanueva | Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="J-favicon.svg">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="brand" href="#home" aria-label="James Villanueva home">
          <span>J</span><span>V</span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <svg class="scroll-trail" viewBox="0 0 220 32" preserveAspectRatio="none" aria-hidden="true">
          <path
            class="scroll-trail-base"
            d="M2 17 C28 2 46 30 72 15 C98 1 118 31 146 15 C172 0 192 29 218 14"
          ></path>
          <path
            class="scroll-trail-flow"
            pathLength="1"
            d="M2 17 C28 2 46 30 72 15 C98 1 118 31 146 15 C172 0 192 29 218 14"
          ></path>
        </svg>
        <ul class="nav-links" data-nav-links></ul>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
          <span data-theme-toggle-label>Dark</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="hero section-panel" id="home" aria-labelledby="home-title">
        <div class="hero-content">
          <p class="section-kicker">Portfolio</p>
          <h1 id="home-title">James Villanueva</h1>
          <p class="hero-summary" data-profile-summary></p>
          <div class="hero-actions" data-profile-actions></div>
        </div>
        <div class="portrait-card" aria-label="Profile portrait">
          <img src="me.jpg" alt="James Villanueva">
        </div>
      </section>

      <section class="section-panel" id="about" aria-labelledby="about-title">
        <div class="section-heading">
          <p class="section-kicker">About</p>
          <h2 id="about-title">Focused on practical, maintainable software.</h2>
        </div>
        <div class="body-copy" data-about-content></div>
      </section>

      <section class="section-panel" id="projects" aria-labelledby="projects-title">
        <div class="section-heading">
          <p class="section-kicker">Displayed Work</p>
          <h2 id="projects-title">Projects</h2>
        </div>
        <div class="project-grid" data-project-list></div>
      </section>

      <section class="section-panel" id="technologies" aria-labelledby="technologies-title">
        <div class="section-heading">
          <p class="section-kicker">Toolkit</p>
          <h2 id="technologies-title">Technologies</h2>
        </div>
        <div class="technology-grid" data-technology-list></div>
      </section>

      <section class="section-panel" id="certificates" aria-labelledby="certificates-title">
        <div class="section-heading">
          <p class="section-kicker">Credentials</p>
          <h2 id="certificates-title">Certificates</h2>
        </div>
        <div class="certificate-list" data-certificate-list></div>
      </section>

      <section class="section-panel contact-section" id="contact" aria-labelledby="contact-title">
        <div class="section-heading">
          <p class="section-kicker">Contact</p>
          <h2 id="contact-title">Let&apos;s connect.</h2>
        </div>
        <div class="contact-layout">
          <div class="body-copy" data-contact-copy></div>
          <div class="contact-actions" data-contact-actions></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
